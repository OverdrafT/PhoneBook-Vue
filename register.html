<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PhoneBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="img/icon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <div id="app" class="flex-grow-1">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">
                    <i class="bi bi-person-lines-fill me-2"></i>PhoneBook
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Contacts</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                        <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-2">
            <div class="row justify-content-center w-100">
                <div class="col-md-5 col-lg-4">
                    <div class="card shadow-sm border-0 p-4">
                        <h3 class="text-center fw-bold mb-4">Create Account</h3>
                        <form @submit.prevent="handleRegister">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Full Name</label>
                                <input type="text" v-model="authData.name" class="form-control" 
                                    placeholder="John Doe" required minlength="3">
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Email Address</label>
                                <input type="email" v-model="authData.email" class="form-control" 
                                    placeholder="name@example.com" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Gender</label>
                                    <select v-model="authData.gender" class="form-select" required>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Date of Birth</label>
                                    <input type="date" v-model="authData.dob" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold">Password</label>
                                <input type="password" v-model="authData.password" class="form-control" 
                                    required minlength="6">
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm fw-bold">Register</button>
                        </form>
                        <div class="text-center mt-3">
                            <p class="small text-muted mb-0">Already have an account? <a href="login.html" class="text-decoration-none">Login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer mt-auto py-3 text-center bg-white border-top">
        <div class="container">
            <span class="text-muted small">© 2026 Laboratory Work №3. Developed by Shcherbatiuk Yevhen, KV-33. All rights reserved.</span>
        </div>
    </footer>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="js/vue-app.js"></script>
</body>
</html>
